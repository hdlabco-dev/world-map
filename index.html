<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEOLIFE CITY — World Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <!-- Top HUD Bar -->
    <div id="city-hud">
        <div class="hud-left">
            <span class="neon-text city-name">NEOLIFE CITY</span>
        </div>
        <div class="hud-center">
            <span class="hud-stat" id="hud-date">---</span>
        </div>
        <div class="hud-right">
            <span class="hud-label">探索進度</span>
            <span class="hud-stat" id="hud-explore-progress">0 / 0</span>
        </div>
    </div>

    <!-- Leaflet Map (fullscreen background) -->
    <div id="map-container"></div>

    <!-- Right Slide-out District Panel -->
    <div id="district-panel" class="cyber-panel">
        <div class="panel-header">
            <span class="neon-text" id="district-name">---</span>
            <button class="panel-close-btn" id="panel-close-btn">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        <div class="panel-body">
            <div id="district-info">
                <!-- District description, level, tags — filled by app.js -->
            </div>
            <div id="knowledge-nodes">
                <!-- Knowledge node list — filled by app.js -->
            </div>
            <button id="explore-btn" class="cyber-btn">
                <i class="fa-solid fa-location-dot"></i> 標記為已探索
            </button>
        </div>
    </div>

    <!-- Fullscreen scanline overlay (CSS animation only) -->
    <div id="scan-overlay"></div>

    <script src="map-engine.js"></script>
    <script src="app.js"></script>
    <script src="agent-overlay.js"></script>
</body>

</html>
