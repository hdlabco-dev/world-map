<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的知識世界 - World Map</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for modern icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Leaflet.js for map-engine -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV/XN/WuvQ=" crossorigin=""></script>
</head>

<body>
    <div id="app">

        <!-- Top Title Bar Overlay (Just the World Name & Toggle) -->
        <header class="top-brand-bar">
            <div class="brand-left">
                <i class="fa-solid fa-chess-rook logo-icon"></i>
                <h1 id="world-name">載入中...</h1>
            </div>

            <button id="toggle-sidebar" class="hud-toggle-btn">
                顯示儀表板 <i class="fa-solid fa-chevron-right"></i>
            </button>
        </header>

        <!-- Slide-out Sidebar Panel -->
        <aside class="side-panel" id="side-panel">
            <button class="close-panel" id="close-sidebar">
                <i class="fa-solid fa-xmark"></i>
            </button>

            <div class="panel-section player-profile">
                <div class="avatar"><i class="fa-solid fa-user-astronaut"></i></div>
                <div class="profile-info">
                    <div class="name-row">
                        <span class="name" id="player-name">---</span>
                        <span class="level-badge" id="player-level">Lv. 0</span>
                    </div>
                    <span class="title" id="player-title">---</span>
                </div>
            </div>

            <div class="panel-section exp-section">
                <div class="exp-bar">
                    <div class="exp-fill" id="exp-fill"></div>
                </div>
                <div class="exp-text" id="exp-text">0 / 0 EXP</div>
            </div>

            <div class="panel-section stats-grid" id="player-stats">
                <!-- Stats injected here -->
            </div>

            <!-- Custom Search / Filters -->
            <div class="panel-section nav-section">
                <h3><i class="fa-solid fa-map-location-dot"></i> 區域導覽</h3>
                <div class="search-box">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="region-search" placeholder="搜尋據點名稱...">
                </div>

                <div class="filters">
                    <button class="filter-btn active" data-filter="all">全部</button>
                    <!-- Filters injected here -->
                </div>

                <!-- Quick jump list -->
                <ul class="region-list-view" id="region-list">
                    <!-- List items generated by JS -->
                </ul>
            </div>
        </aside>

        <!-- Right Side Zoom Controls -->
        <div class="zoom-controls">
            <button id="zoom-in"><i class="fa-solid fa-plus"></i></button>
            <button id="zoom-out"><i class="fa-solid fa-minus"></i></button>
            <button id="zoom-reset"><i class="fa-solid fa-house"></i></button>
        </div>

        <!-- Draggable World Map -->
        <main class="world-viewport" id="viewport">
            <div class="map-container" id="map-container" style="background-image: url('map-bg.png');">
                <!-- Map markers injected here -->
            </div>
        </main>

        <!-- Region Quest Modal -->
        <div class="modal-overlay" id="region-modal">
            <div class="quest-log-content">
                <button class="close-modal"><i class="fa-solid fa-xmark"></i></button>
                <div class="quest-header" id="modal-header">
                    <!-- Region info -->
                </div>
                <div class="quest-body">
                    <h3>【 可探索節點 】</h3>
                    <ul class="subfolders-list" id="modal-subfolders">
                        <!-- Subfolders -->
                    </ul>
                    <div class="npc-section" id="modal-npc"></div>
                </div>
                <div class="quest-footer">
                    <button class="action-btn" id="enter-region-btn">進入區域</button>
                </div>
            </div>
        </div>

    </div>
    <script src="map-engine.js"></script>
    <script src="app.js"></script>
</body>

</html>
